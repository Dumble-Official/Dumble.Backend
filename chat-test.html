<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dumble Chat — Test Console</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root { --bg-dark: #1a1d23; --bg-card: #22262e; --bg-input: #2a2e36; --border: #383c44; --text: #e4e6ea; --text-muted: #8b8f96; --accent: #4f9cf7; --accent-hover: #3b8ae6; --success: #3bc48a; --danger: #f56565; --warning: #f0c040; --msg-self: #2b3548; --msg-other: #272b33; --radius: 10px; }
* { box-sizing: border-box; }
body { background: var(--bg-dark); color: var(--text); font-family: system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; min-height: 100vh; }
.section-title { font-size: .7rem; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); margin-bottom: .4rem; }
.form-control, .form-select { background: var(--bg-input); border: 1px solid var(--border); color: var(--text); font-size: .85rem; }
.form-control:focus, .form-select:focus { background: var(--bg-input); border-color: var(--accent); color: var(--text); box-shadow: 0 0 0 .2rem rgba(79,156,247,.25); }
.form-control::placeholder { color: var(--text-muted); }
.btn-sm { font-size: .78rem; }
.badge-status { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
.badge-online { background: var(--success); }
.badge-offline { background: var(--text-muted); }
.typing-indicator { font-size: .78rem; color: var(--text-muted); font-style: italic; min-height: 1.2rem; }
.msg { padding: .55rem .8rem; border-radius: var(--radius); margin-bottom: .35rem; max-width: 85%; word-wrap: break-word; position: relative; }
.msg-self { background: var(--msg-self); align-self: flex-end; }
.msg-other { background: var(--msg-other); align-self: flex-start; }
.msg .sender { font-size: .72rem; font-weight: 600; color: var(--accent); }
.msg .time { font-size: .65rem; color: var(--text-muted); white-space: nowrap; }
.msg .actions { position: absolute; top: .3rem; right: .4rem; opacity: 0; transition: opacity .15s; }
.msg:hover .actions { opacity: 1; }
.msg .actions button { background: none; border: none; color: var(--text-muted); padding: 0 .2rem; font-size: .7rem; cursor: pointer; }
.msg .actions button:hover { color: var(--text); }
.msg.deleted { opacity: .5; font-style: italic; }
.msg.edited::after { content: 'edited'; font-size: .65rem; color: var(--text-muted); margin-left: .4rem; }
.conv-item { padding: .45rem .65rem; border-radius: 6px; cursor: pointer; transition: background .12s; font-size: .85rem; display: flex; align-items: center; gap: .5rem; }
.conv-item:hover { background: rgba(79,156,247,.1); }
.conv-item.active { background: rgba(79,156,247,.2); border-left: 3px solid var(--accent); }
.conv-list { max-height: 200px; overflow-y: auto; }
.chat-messages { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: .2rem; padding: .75rem; min-height: 320px; max-height: 420px; }
.user-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: .9rem; height: 100%; }
.chat-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; }
.log-area { background: #111; border: 1px solid var(--border); border-radius: 6px; padding: .5rem .7rem; font-family: 'Cascadia Code','Fira Code',monospace; font-size: .75rem; max-height: 140px; overflow-y: auto; white-space: pre-wrap; color: #b4b8c0; }
.log-area .log-entry { opacity: .85; }
.log-area .log-info { color: var(--accent); }
.log-area .log-success { color: var(--success); }
.log-area .log-error { color: var(--danger); }
.log-area .log-warn { color: var(--warning); }
.empty-state { color: var(--text-muted); text-align: center; padding: 2rem 1rem; font-size: .9rem; }
.edit-input { width: 100%; background: var(--bg-input); border: 1px solid var(--accent); color: var(--text); border-radius: 4px; padding: .3rem .5rem; font-size: .85rem; }
.btn-as { font-size: .78rem; padding: .18rem .5rem; }
#toast-container { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999; display: flex; flex-direction: column; gap: .4rem; }
.toast-custom { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: .6rem 1rem; font-size: .85rem; box-shadow: 0 8px 24px rgba(0,0,0,.4); animation: slideIn .25s ease; min-width: 240px; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>
<body>

<div class="container-fluid py-3 px-4">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="mb-0 fw-semibold">Dumble Chat <span style="color:var(--text-muted);font-weight:400;font-size:.8rem;">Test Console</span></h5>
    <div id="connectionStatus" class="d-flex align-items-center gap-2" style="font-size:.82rem;">
      <span class="badge-status badge-offline" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <div class="row g-2 mb-3">
    <div class="col-md-5">
      <input class="form-control form-control-sm" id="apiUrl" value="http://localhost:5022" placeholder="API URL">
    </div>
    <div class="col-md-5">
      <input class="form-control form-control-sm" id="jwtSecret" value="dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2gtZm9yLWhtYWMtc2hhMjU2LXZhbGlkYXRpb24=" placeholder="JWT Secret (base64)">
    </div>
    <div class="col-md-2 d-flex gap-1">
      <button class="btn btn-outline-secondary btn-sm flex-fill" onclick="clearLog()">Clear Log</button>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-3" id="panelA"><div class="user-panel" data-user="alice"></div></div>
    <div class="col-md-3" id="panelB"><div class="user-panel" data-user="bob"></div></div>
    <div class="col-md-6">
      <div class="chat-panel h-100">
        <div class="d-flex align-items-center gap-2 px-3 py-2 border-bottom" style="border-color:var(--border)!important;">
          <span style="font-size:.85rem;" id="chatTitle">Select a conversation</span>
          <span class="badge-status" id="chatTypingDot" style="margin-left:auto;"></span>
          <span class="typing-indicator" id="chatTyping"></span>
        </div>
        <div class="chat-messages" id="chatMessages">
          <div class="empty-state">Select a conversation to view messages</div>
        </div>
        <div class="px-3 py-2 border-top d-flex gap-2 align-items-center" style="border-color:var(--border)!important;">
          <select class="form-select form-select-sm" id="sendAs" style="width:auto;min-width:90px;">
            <option value="alice">Alice</option>
            <option value="bob">Bob</option>
          </select>
          <input class="form-control form-control-sm" id="msgInput" placeholder="Type a message..." style="flex:1;">
          <button class="btn btn-primary btn-sm" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12">
      <div class="section-title">Event Log</div>
      <div class="log-area" id="logArea"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<script>
// ─── State ─────────────────────────────────────────────
const state = {
  users: {
    alice: { userId: 'alice-test', displayName: 'Alice', profileImage: '', jwt: null, hubToken: null, connection: null, conversations: [], selectedConv: null },
    bob:   { userId: 'bob-test',   displayName: 'Bob',   profileImage: '', jwt: null, hubToken: null, connection: null, conversations: [], selectedConv: null }
  },
  currentConvId: null,
  currentConvName: null
};

// ─── Utilities ─────────────────────────────────────────
function base64UrlEncode(str) {
  return btoa(str).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

function base64UrlDecode(str) {
  str = str.replace(/-/g, '+').replace(/_/g, '/');
  while (str.length % 4) str += '=';
  return atob(str);
}

async function createJWT(payload, secretBase64) {
  const header = { alg: 'HS256', typ: 'JWT' };
  const now = Math.floor(Date.now() / 1000);
  payload.iat = now;
  payload.exp = now + 3600;
  const headerB64 = base64UrlEncode(JSON.stringify(header));
  const payloadB64 = base64UrlEncode(JSON.stringify(payload));
  const data = headerB64 + '.' + payloadB64;
  const rawKey = Uint8Array.from(atob(secretBase64), c => c.charCodeAt(0));
  const key = await crypto.subtle.importKey('raw', rawKey, { name: 'HMAC', hash: 'SHA-256' }, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(data));
  const sigB64 = base64UrlEncode(String.fromCharCode(...new Uint8Array(sig)));
  return data + '.' + sigB64;
}

function getApiUrl() { return document.getElementById('apiUrl').value.replace(/\/+$/, ''); }
function getSecret() { return document.getElementById('jwtSecret').value; }

function log(type, msg) {
  const el = document.getElementById('logArea');
  const d = new Date();
  const ts = d.toLocaleTimeString();
  const div = document.createElement('div');
  div.className = 'log-entry log-' + type;
  div.textContent = `[${ts}] ${msg}`;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

function showToast(msg, type) {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = 'toast-custom';
  el.style.borderLeft = '4px solid ' + (type === 'error' ? 'var(--danger)' : type === 'success' ? 'var(--success)' : 'var(--accent)');
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3500);
}

function updateOnlineStatus(userId) {
  const u = state.users[userId];
  if (!u || !u.connection) return;
  const dot = document.querySelector(`[data-user="${userId}"] .badge-status`);
  if (dot) dot.className = 'badge-status ' + (u.online ? 'badge-online' : 'badge-offline');
}

// ─── User Panel Render ────────────────────────────────
function renderPanel(userId) {
  const u = state.users[userId];
  const panel = document.querySelector(`[data-user="${userId}"]`);
  const name = userId === 'alice' ? 'Alice' : 'Bob';
  const color = userId === 'alice' ? '#4f9cf7' : '#3bc48a';
  const connected = u.connection && u.connection.state === 'Connected';

  panel.innerHTML = `
    <div class="d-flex align-items-center gap-2 mb-2">
      <span style="width:10px;height:10px;border-radius:50%;background:${color};"></span>
      <strong style="font-size:.9rem;">${name}</strong>
      <span class="badge-status ${connected ? 'badge-online' : 'badge-offline'}" style="margin-left:auto;"></span>
      <span style="font-size:.72rem;color:var(--text-muted);">${connected ? 'Connected' : 'Offline'}</span>
    </div>
    <div class="d-flex gap-1 mb-2">
      <input class="form-control form-control-sm" id="uid-${userId}" value="${u.userId}" placeholder="User ID" style="flex:1;">
      <input class="form-control form-control-sm" id="dname-${userId}" value="${u.displayName}" placeholder="Name" style="flex:1;">
    </div>
    <div class="d-flex gap-1 mb-2">
      <button class="btn btn-primary btn-sm flex-fill" id="loginBtn-${userId}" onclick="loginUser('${userId}')" ${connected ? 'disabled' : ''}>Login</button>
      <button class="btn btn-outline-secondary btn-sm" onclick="disconnectUser('${userId}')" ${!connected ? 'disabled' : ''}>Disconnect</button>
    </div>
    <div class="section-title mt-2">Conversations</div>
    <div class="conv-list" id="convList-${userId}">
      ${u.conversations.length === 0 ? '<div style="color:var(--text-muted);font-size:.8rem;padding:.3rem 0;">No conversations</div>' : ''}
      ${u.conversations.map(c => `
        <div class="conv-item ${state.currentConvId === c.id ? 'active' : ''}" onclick="selectConversation('${userId}','${c.id}','${c.name.replace(/'/g,"\\'")}')">
          <span>${c.name || '#'+c.id.slice(-6)}</span>
        </div>
      `).join('')}
    </div>
    <div class="d-flex gap-1 mt-1">
      <input class="form-control form-control-sm" id="newConv-${userId}" placeholder="User IDs (comma)" style="font-size:.75rem;">
      <button class="btn btn-outline-primary btn-sm" onclick="createConversation('${userId}')" ${!connected ? 'disabled' : ''}>+</button>
    </div>
  `;
}

function renderConversations(userId) {
  const u = state.users[userId];
  const list = document.getElementById('convList-' + userId);
  if (!list) return;
  if (u.conversations.length === 0) {
    list.innerHTML = '<div style="color:var(--text-muted);font-size:.8rem;padding:.3rem 0;">No conversations</div>';
    return;
  }
  list.innerHTML = u.conversations.map(c => `
    <div class="conv-item ${state.currentConvId === c.id ? 'active' : ''}" onclick="selectConversation('${userId}','${c.id}','${(c.name || '#'+c.id.slice(-6)).replace(/'/g,"\\'")}')">
      <span>${c.name || '#' + c.id.slice(-6)}</span>
    </div>
  `).join('');
}

// ─── Auth ──────────────────────────────────────────────
async function loginUser(userId) {
  const u = state.users[userId];
  u.userId = document.getElementById('uid-' + userId).value.trim() || u.userId;
  u.displayName = document.getElementById('dname-' + userId).value.trim() || u.displayName;
  const secret = getSecret();
  if (!secret) { log('error', 'JWT secret is required'); showToast('JWT secret is required', 'error'); return; }

  try {
    log('info', `${u.displayName}: Creating regular JWT (REST API)...`);
    u.jwt = await createJWT({ userId: u.userId, displayName: u.displayName, profileImage: u.profileImage }, secret);
    log('info', `${u.displayName}: Creating hub JWT (SignalR)...`);
    u.hubToken = await createJWT({ userId: u.userId, displayName: u.displayName, profileImage: u.profileImage, purpose: 'hub' }, secret);
    log('success', `${u.displayName}: Tokens created`);
    await connectSignalR(userId);
  } catch (e) {
    log('error', `${u.displayName}: Login failed — ${e.message}`);
    showToast(`Login failed: ${e.message}`, 'error');
  }
}

// ─── SignalR ───────────────────────────────────────────
async function connectSignalR(userId) {
  const u = state.users[userId];
  if (u.connection) { await u.connection.stop(); u.connection = null; }

  const conn = new signalR.HubConnectionBuilder()
    .withUrl(getApiUrl() + '/hubs/chat', { accessTokenFactory: () => u.hubToken })
    .withAutomaticReconnect()
    .build();

  conn.on('ReceiveMessage', msg => { onReceiveMessage(msg); });
  conn.on('MessageDeleted', data => { onMessageDeleted(data); });
  conn.on('MessageEdited', data => { onMessageEdited(data); });
  conn.on('UserOnline', data => { onUserOnline(data.userId, true); });
  conn.on('UserOffline', data => { onUserOnline(data.userId, false); });
  conn.on('UserTyping', data => { onUserTyping(data); });
  conn.on('UserStoppedTyping', data => { onUserStoppedTyping(data); });

  conn.onreconnecting(() => { log('warn', `${u.displayName}: Reconnecting...`); updateGlobalStatus(); });
  conn.onreconnected(() => { log('success', `${u.displayName}: Reconnected`); updateGlobalStatus(); });
  conn.onclose(() => { log('warn', `${u.displayName}: Disconnected`); updateGlobalStatus(); });

  try {
    await conn.start();
    u.connection = conn;
    u.online = true;
    log('success', `${u.displayName}: SignalR connected`);
    showToast(`${u.displayName} connected`, 'success');
    renderPanel(userId);
    updateGlobalStatus();
    loadConversations(userId);
  } catch (e) {
    log('error', `${u.displayName}: Connection failed — ${e.message}`);
    showToast(`Connection failed: ${e.message}`, 'error');
  }
}

async function disconnectUser(userId) {
  const u = state.users[userId];
  if (u.connection) { await u.connection.stop(); u.connection = null; }
  u.online = false;
  u.conversations = [];
  u.selectedConv = null;
  renderPanel(userId);
  updateGlobalStatus();
  log('info', `${u.displayName}: Disconnected`);
}

function updateGlobalStatus() {
  const alice = state.users.alice.connection && state.users.alice.connection.state === 'Connected';
  const bob = state.users.bob.connection && state.users.bob.connection.state === 'Connected';
  const dot = document.getElementById('statusDot');
  const txt = document.getElementById('statusText');
  if (alice || bob) {
    dot.className = 'badge-status badge-online';
    const parts = [];
    if (alice) parts.push('Alice');
    if (bob) parts.push('Bob');
    txt.textContent = parts.join(' + ') + ' Connected';
  } else {
    dot.className = 'badge-status badge-offline';
    txt.textContent = 'Disconnected';
  }
}

// ─── Conversations ─────────────────────────────────────
async function loadConversations(userId) {
  const u = state.users[userId];
  try {
    const resp = await fetch(getApiUrl() + '/api/chat/conversations', {
      headers: { 'Authorization': 'Bearer ' + u.jwt }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const list = await resp.json();
    u.conversations = Array.isArray(list) ? list : (list.items || list.data || []);
    renderConversations(userId);
    log('success', `${u.displayName}: Loaded ${u.conversations.length} conversations`);
  } catch (e) {
    log('error', `${u.displayName}: Load conversations failed — ${e.message}`);
  }
}

async function createConversation(userId) {
  const input = document.getElementById('newConv-' + userId);
  const u = state.users[userId];
  const raw = input.value.trim();
  const ids = raw ? raw.split(',').map(s => s.trim()).filter(Boolean) : [];
  ids.push(u.userId);
  const uniqueIds = [...new Set(ids)];

  try {
    const resp = await fetch(getApiUrl() + '/api/chat/conversations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + u.jwt },
      body: JSON.stringify({ participantUserIds: uniqueIds, name: uniqueIds.join(', ') })
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const conv = await resp.json();
    input.value = '';
    log('success', `${u.displayName}: Created conversation ${conv.id}`);
    showToast('Conversation created', 'success');
    loadConversations(userId);
    if (state.users[userId === 'alice' ? 'bob' : 'alice'].connection) {
      loadConversations(userId === 'alice' ? 'bob' : 'alice');
    }
  } catch (e) {
    log('error', `${u.displayName}: Create conversation failed — ${e.message}`);
    showToast('Create failed: ' + e.message, 'error');
  }
}

// ─── Messages ──────────────────────────────────────────
async function loadMessages(convId) {
  const alice = state.users.alice;
  const bob = state.users.bob;
  const jwt = (alice.connection && alice.connection.state === 'Connected') ? alice.jwt :
              (bob.connection && bob.connection.state === 'Connected') ? bob.jwt : null;
  if (!jwt) return;

  try {
    const resp = await fetch(getApiUrl() + '/api/chat/conversations/' + convId + '/messages?limit=50', {
      headers: { 'Authorization': 'Bearer ' + jwt }
    });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    const msgs = Array.isArray(data) ? data : (data.items || data.data || []);
    log('info', `Loaded ${msgs.length} messages`);
    renderMessages(msgs);
  } catch (e) {
    log('error', `Load messages failed — ${e.message}`);
  }
}

function renderMessages(msgs) {
  const el = document.getElementById('chatMessages');
  if (msgs.length === 0) {
    el.innerHTML = '<div class="empty-state">No messages yet. Send one!</div>';
    return;
  }
  el.innerHTML = msgs.map(m => renderMessageHtml(m)).join('');
  el.scrollTop = el.scrollHeight;
}

function renderMessageHtml(m) {
  const isSelf = m.senderId === state.users.alice.userId || m.senderId === state.users.bob.userId;
  const cls = isSelf ? 'msg-self' : 'msg-other';
  const del = m.isDeleted ? ' deleted' : '';
  const edited = m.isEdited ? ' edited' : '';
  const time = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const content = m.isDeleted ? 'This message was deleted' : escHtml(m.content);

  let actions = '';
  if (!m.isDeleted && m.senderId === state.users.alice.userId) {
    actions = `<span class="actions"><button onclick="editMessage('${m.id}','${escHtml(m.content).replace(/'/g,"\\'")}')" title="Edit">✏️</button><button onclick="deleteMessage('${m.id}')" title="Delete">🗑️</button></span>`;
  } else if (!m.isDeleted && m.senderId === state.users.bob.userId) {
    actions = `<span class="actions"><button onclick="editMessage('${m.id}','${escHtml(m.content).replace(/'/g,"\\'")}')" title="Edit">✏️</button><button onclick="deleteMessage('${m.id}')" title="Delete">🗑️</button></span>`;
  }

  return `<div class="msg ${cls}${del}${edited}" data-msg-id="${m.id}">
    ${actions}
    <div class="sender">${escHtml(m.senderName || m.senderId)} <span class="time">${time}</span></div>
    <div class="msg-content">${content}</div>
  </div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function selectConversation(userId, convId, convName) {
  state.currentConvId = convId;
  state.currentConvName = convName;
  document.getElementById('chatTitle').textContent = convName || '#' + convId.slice(-6);
  renderConversations('alice');
  renderConversations('bob');

  const alice = state.users.alice;
  const bob = state.users.bob;
  [alice, bob].forEach(u => {
    if (u.connection && u.connection.state === 'Connected') {
      u.connection.invoke('JoinConversation', convId).catch(e => log('warn', `Join conv failed: ${e.message}`));
    }
  });

  loadMessages(convId);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content || !state.currentConvId) return;
  const as = document.getElementById('sendAs').value;
  const u = state.users[as];
  if (!u.connection || u.connection.state !== 'Connected') {
    showToast(as + ' is not connected', 'error');
    return;
  }

  try {
    await u.connection.invoke('SendMessage', state.currentConvId, content, null);
    input.value = '';
    log('info', `${u.displayName}: Sent message`);
  } catch (e) {
    log('error', `Send failed — ${e.message}`);
    showToast('Send failed: ' + e.message, 'error');
  }
}

async function deleteMessage(msgId) {
  const alice = state.users.alice;
  const bob = state.users.bob;
  const jwt = (alice.connection && alice.connection.state === 'Connected') ? alice.jwt :
              (bob.connection && bob.connection.state === 'Connected') ? bob.jwt : null;
  if (!jwt) return;

  try {
    const resp = await fetch(getApiUrl() + '/api/chat/messages/' + msgId, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + jwt }
    });
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${txt}`);
    }
    log('success', `Message ${msgId} deleted`);
  } catch (e) {
    log('error', `Delete failed — ${e.message}`);
    showToast('Delete failed: ' + e.message, 'error');
  }
}

async function editMessage(msgId, currentContent) {
  const alice = state.users.alice;
  const bob = state.users.bob;
  const jwt = (alice.connection && alice.connection.state === 'Connected') ? alice.jwt :
              (bob.connection && bob.connection.state === 'Connected') ? bob.jwt : null;
  if (!jwt) return;

  const newContent = prompt('Edit message:', currentContent);
  if (!newContent || newContent === currentContent) return;

  try {
    const resp = await fetch(getApiUrl() + '/api/chat/messages/' + msgId, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + jwt },
      body: JSON.stringify({ content: newContent })
    });
    if (!resp.ok) {
      const txt = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${txt}`);
    }
    log('success', `Message ${msgId} edited`);
  } catch (e) {
    log('error', `Edit failed — ${e.message}`);
    showToast('Edit failed: ' + e.message, 'error');
  }
}

// ─── Real-time Event Handlers ──────────────────────────
function onReceiveMessage(msg) {
  log('info', `Real-time: Message from ${msg.senderName}`);
  if (msg.conversationId !== state.currentConvId) {
    showToast(`New message in conversation ${msg.conversationId.slice(-6)}`, 'info');
    [state.users.alice, state.users.bob].forEach(u => {
      if (u.connection && u.connection.state === 'Connected') loadConversations(u.userId === 'alice' ? 'alice' : 'bob');
    });
    return;
  }
  const el = document.getElementById('chatMessages');
  const empty = el.querySelector('.empty-state');
  if (empty) el.innerHTML = '';
  el.insertAdjacentHTML('beforeend', renderMessageHtml(msg));
  el.scrollTop = el.scrollHeight;
}

function onMessageDeleted(data) {
  log('info', `Real-time: Message deleted — ${data.messageId}`);
  const msgEl = document.querySelector(`.msg[data-msg-id="${data.messageId}"]`);
  if (msgEl) {
    msgEl.classList.add('deleted');
    msgEl.querySelector('.msg-content').textContent = 'This message was deleted';
    const actions = msgEl.querySelector('.actions');
    if (actions) actions.remove();
  }
  if (data.conversationId !== state.currentConvId) return;
  loadMessages(state.currentConvId);
}

function onMessageEdited(data) {
  log('info', `Real-time: Message edited — ${data.messageId}`);
  const msgEl = document.querySelector(`.msg[data-msg-id="${data.messageId}"]`);
  if (msgEl) {
    msgEl.classList.add('edited');
    msgEl.querySelector('.msg-content').textContent = data.content;
  }
  if (data.conversationId !== state.currentConvId) return;
  loadMessages(state.currentConvId);
}

function onUserOnline(userId, online) {
  let which = null;
  if (userId === state.users.alice.userId) which = 'alice';
  else if (userId === state.users.bob.userId) which = 'bob';
  else return;
  state.users[which].online = online;
  renderPanel(which);
  log('info', `Presence: ${state.users[which].displayName} ${online ? 'online' : 'offline'}`);
}

function onUserTyping(data) {
  if (data.conversationId !== state.currentConvId) return;
  const isCurrentUser = data.userId === state.users.alice.userId || data.userId === state.users.bob.userId;
  const name = data.displayName || data.userId;
  document.getElementById('chatTyping').textContent = `${name} is typing...`;
  document.getElementById('chatTypingDot').className = 'badge-status badge-online';
}

function onUserStoppedTyping(data) {
  if (data.conversationId !== state.currentConvId) return;
  document.getElementById('chatTyping').textContent = '';
  document.getElementById('chatTypingDot').className = 'badge-status';
}

// ─── Init ──────────────────────────────────────────────
document.getElementById('msgInput').addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });
renderPanel('alice');
renderPanel('bob');
log('info', 'Console ready — log in Alice and Bob to begin');

// Typing indicator: send start/stop when typing
let typingTimer = null;
document.getElementById('msgInput').addEventListener('input', function() {
  if (!state.currentConvId) return;
  const as = document.getElementById('sendAs').value;
  const u = state.users[as];
  if (!u.connection || u.connection.state !== 'Connected') return;
  u.connection.invoke('StartTyping', state.currentConvId).catch(() => {});
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => {
    u.connection.invoke('StopTyping', state.currentConvId).catch(() => {});
  }, 2000);
});
</script>
</body>
</html>
