# Docker Compose for testing .NET microservices
# Usage: docker compose -f tests/docker-compose.test.yml --env-file tests/.env.test up --build

services:
  # ── Infrastructure ──────────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    ports:
      - "16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bundle-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${BUNDLE_DB_PASSWORD}
      MSSQL_PID: Developer
    ports:
      - "11433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── .NET Application Services ───────────────────────────────────────

  notification-service:
    build:
      context: ../services
      dockerfile: Dumble.NotificationService/Dockerfile
    ports:
      - "5023:5023"
    environment:
      ASPNETCORE_URLS: http://+:5023
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__MongoDb: mongodb://admin:${MONGO_PASSWORD}@mongo:27017
      MongoDb__DatabaseName: dumble_notifications
      JWT_SECRET: ${JWT_SECRET}
      RabbitMQ__Host: rabbitmq
    depends_on:
      mongo:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  bundle-service:
    build:
      context: ../services
      dockerfile: Dumble.BundleManagementService/Dumble.BundleManagementService.API/Dockerfile
    ports:
      - "5012:5012"
    environment:
      ASPNETCORE_URLS: http://+:5012
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DatabaseConnection: "Server=bundle-db,1433;Database=dumble_bundles;User Id=sa;Password=${BUNDLE_DB_PASSWORD};TrustServerCertificate=True"
      Cloudinary__CloudName: ${CLOUDINARY_CLOUD_NAME}
      Cloudinary__ApiKey: ${CLOUDINARY_API_KEY}
      Cloudinary__ApiSecret: ${CLOUDINARY_API_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      Jwt__Secret: ${JWT_SECRET}
    depends_on:
      bundle-db:
        condition: service_healthy
