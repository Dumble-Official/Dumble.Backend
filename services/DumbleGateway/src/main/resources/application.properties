# Subscription Service — its controllers live at multiple roots (/me/plan, /me/bundle-subscriptions,
# /entry-tokens, /plans, /admin/platform, /admin/sellers, /webhooks). Listed explicitly here so
# /api/me/** doesn't have to fight with any service that adopts a /me/* prefix later.
spring.cloud.gateway.server.webmvc.routes[17].id=subscription-service
spring.cloud.gateway.server.webmvc.routes[17].uri=${SUBSCRIPTION_SERVICE_URL:http://localhost:8182}
spring.cloud.gateway.server.webmvc.routes[17].predicates[0]=Path=/api/me/entitlements,/api/me/plan/**,/api/me/bundle-subscriptions/**,/api/me/receipts/**,/api/me/earnings/**,/api/me/bank-account,/api/me/gym/**,/api/me/preferences,/api/me/deactivate,/api/me/subscribers,/api/entry-tokens/**,/api/plans,/api/bundle-subscriptions/**,/api/admin/platform/**,/api/admin/sellers/**,/api/webhooks/system/**
