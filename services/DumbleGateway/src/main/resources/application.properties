spring.application.name=DumbleGateway
server.port=8080

# JWT Configuration (must match Auth service secret) — fail-fast if missing.
jwt.secret=${JWT_SECRET}

# Actuator — expose only the probe endpoints externally. health.show-details=never
# keeps internal dep status (Redis, downstreams) out of the public response.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true

# Redis Configuration
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2s
spring.data.redis.connect-timeout=2s

# ── Downstream HTTP timeouts ────────────────────────────────────────
# Caps how long the gateway waits on a slow backend; without this a single
# slow service can exhaust the gateway's request thread pool.
spring.cloud.gateway.server.webmvc.http-client.connect-timeout=2s
spring.cloud.gateway.server.webmvc.http-client.read-timeout=10s

# ── Resilience4j (default circuit breaker for every route) ──────────
spring.cloud.gateway.server.webmvc.default-filters[0]=CircuitBreaker=defaultCB

resilience4j.circuitbreaker.instances.defaultCB.sliding-window-size=20
resilience4j.circuitbreaker.instances.defaultCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.defaultCB.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.defaultCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.defaultCB.minimum-number-of-calls=10

resilience4j.timelimiter.instances.defaultCB.timeout-duration=10s
resilience4j.timelimiter.instances.defaultCB.cancel-running-future=true

# ── Auth-endpoint rate limit (used by AuthRateLimitFilter) ──────────
# Strict cap for unauthenticated credential paths (login/register/refresh/google).
auth.rate-limit.requests-per-minute=10
# Higher cap for /api/auth/hub-token which already requires a valid access token.
auth.rate-limit.hub-token-per-minute=30
# What to do when Redis is unreachable during a rate-limit check.
#   open   — let the request through (availability favoured; brute-force window).
#   closed — return 503 (security favoured; hard-fail on cache outage).
auth.rate-limit.fail-mode=${RATELIMIT_FAIL_MODE:open}

# ── CORS allowed origins (used by CorsConfig) ───────────────────────
# Comma-separated list of explicit origin URLs the browser may use. No wildcards
# in production. Example: https://app.dumble.example.com,https://www.dumble.example.com
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Reverse-proxy trust (used by AuthRateLimitFilter clientIp resolver) ─
# Comma-separated list of trusted reverse-proxy IPs whose X-Forwarded-For header
# the gateway will honour. Empty means ignore X-Forwarded-* entirely (use the
# direct remote address). Without this guard, any client can spoof the header
# and bypass the per-IP rate limit on /api/auth endpoints.
gateway.trusted-proxies=${TRUSTED_PROXIES:}

# ── Route Definitions ────────────────────────────────────────────────

# Auth Service
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

# User Service (same backend as Auth)
spring.cloud.gateway.server.webmvc.routes[1].id=user-service
spring.cloud.gateway.server.webmvc.routes[1].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/users/**

