spring.cloud.gateway.server.webmvc.routes[5].uri=${SOCIAL_SERVICE_URL:http://localhost:5021}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/social/**
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=CircuitBreaker=defaultCB

# Home feed — Social Service. Narrowed to the EXACT /api/feed path (no /**), so the
