spring.cloud.gateway.server.webmvc.routes[2].uri=${POST_SERVICE_URL:http://localhost:5134}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/posts/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=CircuitBreaker=defaultCB

