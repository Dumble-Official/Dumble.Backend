spring.cloud.gateway.server.webmvc.routes[6].uri=${SOCIAL_SERVICE_URL:http://localhost:5021}
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/api/feed
spring.cloud.gateway.server.webmvc.routes[6].filters[0]=CircuitBreaker=defaultCB

