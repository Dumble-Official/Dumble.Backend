spring.cloud.gateway.server.webmvc.routes[16].filters[0]=CircuitBreaker=defaultCB

# Subscription Service — its controllers live at multiple roots (/me/plan, /me/bundle-subscriptions,
# /entry-tokens, /plans, /admin/platform, /admin/sellers, /webhooks). Listed explicitly here so
# /api/me/** doesn't have to fight with any service that adopts a /me/* prefix later.
spring.cloud.gateway.server.webmvc.routes[17].id=subscription-service
spring.cloud.gateway.server.webmvc.routes[17].uri=${SUBSCRIPTION_SERVICE_URL:http://localhost:8182}
spring.cloud.gateway.server.webmvc.routes[17].predicates[0]=Path=/api/me/entitlements,/api/me/plan/**,/api/me/bundle-subscriptions/**,/api/me/receipts/**,/api/me/earnings/**,/api/me/bank-account,/api/me/gym/**,/api/me/preferences,/api/me/deactivate,/api/me/winding-down,/api/me/seller/**,/api/me/subscribers/**,/api/me/revenue,/api/me/retention,/api/entry-tokens/**,/api/plans,/api/bundle-subscriptions/**,/api/admin/platform/**,/api/admin/sellers/**,/api/webhooks/system/**
spring.cloud.gateway.server.webmvc.routes[17].filters[0]=CircuitBreaker=defaultCB

# FitCoach (Python AI chatbot) — gated by CoachEntitlementFilter which
# verifies the Subscription plan, decrements the Redis daily counter, and
# injects X-User-Id + X-Internal-Secret before proxying. RewritePath strips
# the /api/coach prefix so FitCoach sees its native /chat, /voice, etc.
#
# Deliberately NO CircuitBreaker on this route: /chat/stream and
# /analyze/stream are SSE that legitimately stay open for minutes during
# Gemini tool-call loops. A Resilience4j time-limiter would cancel the
# future mid-stream — the chatbot has its own per-request error handling
# and the 60s socket read-timeout already protects against fully-stuck
# upstreams.
spring.cloud.gateway.server.webmvc.routes[18].id=fitcoach-service
spring.cloud.gateway.server.webmvc.routes[18].uri=${FITCOACH_SERVICE_URL:http://localhost:8000}
spring.cloud.gateway.server.webmvc.routes[18].predicates[0]=Path=/api/coach/**
spring.cloud.gateway.server.webmvc.routes[18].filters[0]=RewritePath=/api/coach/(?<segment>.*), /$\{segment}

# ── FitCoach gating (used by CoachEntitlementFilter) ────────────────
fitcoach.internal-secret=${INTERNAL_API_SECRET:}
fitcoach.subscription-base-url=${SUBSCRIPTION_SERVICE_URL:http://localhost:8182}
# Fail mode when Subscription is unreachable during the entitlement
# check: open lets the request through (favours availability), closed
# returns 503. Default closed — chatbot is a paid feature; better to
# refuse than to give it away free during an outage.
fitcoach.fail-mode=${FITCOACH_FAIL_MODE:closed}

# Role-promotion review (admin) — Auth Service. The applicant side is already
