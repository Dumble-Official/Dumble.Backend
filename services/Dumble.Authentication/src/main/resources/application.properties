spring.application.name=DumbleAuthentication
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/dumble_project
spring.datasource.username=postgres
spring.datasource.password=${DATABASEPASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration — fail-fast if env var missing rather than fall back to a known secret.
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
# Short-lived token used only for SignalR WebSocket negotiation. The hub URL
# leaks into browser history / Referer / proxy logs by design (browsers can't
# attach custom headers on the WebSocket upgrade), so we cap the blast radius
# to 60 seconds — long enough to open the connection, short enough to be
# useless once the hub session is established.
jwt.hub-token-expiration=60000

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}

# Redis Configuration (shared cache with API Gateway)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}