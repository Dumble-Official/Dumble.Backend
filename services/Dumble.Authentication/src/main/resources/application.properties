spring.application.name=DumbleAuthentication
server.port=8081

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/dumble_project}
spring.datasource.username=postgres
spring.datasource.password=${DATABASEPASS}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Configuration — fail-fast if env var missing rather than fall back to a known secret.
jwt.secret=${JWT_SECRET}
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000
# Short-lived token used only for SignalR WebSocket negotiation. The hub URL
# leaks into browser history / Referer / proxy logs by design (browsers can't
# attach custom headers on the WebSocket upgrade), so we cap the blast radius
# to 60 seconds — long enough to open the connection, short enough to be
# useless once the hub session is established.
jwt.hub-token-expiration=60000

# Shared secret for service-to-service /api/internal/** calls (e.g. the gym
# service promoting an approved applicant to GYM_OWNER). Empty = those endpoints
# reject everything (fail-closed).
internal.api-secret=${INTERNAL_API_SECRET:}

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}

# Redis Configuration (shared cache with API Gateway)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
# Optional auth + TLS for managed Redis (e.g. Upstash). Default off so local
# dev against a plain redis container is unaffected.
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# RabbitMQ — publishes AccountDeleted on the shared dumble.events topic exchange
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Initial admin bootstrap — on a fresh install the user table is empty, so
# every /admin/** endpoint returns 403 with no escape hatch. Enable this and
# set ADMIN_EMAIL + ADMIN_PASSWORD to seed an ADMIN row on first boot. The
# runner is idempotent; once the row exists, subsequent boots are no-ops.
auth.bootstrap.admin.enabled=${ADMIN_BOOTSTRAP_ENABLED:false}
auth.bootstrap.admin.email=${ADMIN_EMAIL:}
auth.bootstrap.admin.password=${ADMIN_PASSWORD:}
auth.bootstrap.admin.first-name=${ADMIN_FIRST_NAME:Platform}
auth.bootstrap.admin.last-name=${ADMIN_LAST_NAME:Admin}