spring:
  application:
    name: wallet-service
  profiles:
    active: dev

  datasource:
    url: ${WALLET_DB_URL:jdbc:postgresql://localhost:5432/dumble_wallet}
    username: ${WALLET_DB_USERNAME:postgres}
    password: ${WALLET_DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Default pool of 10 is undersized: every business operation now needs
      # two connections (the main @Transactional plus the AuditLogger's
      # REQUIRES_NEW boundary). At realistic concurrency that doubles the
      # pool demand; the chaos + load suites surfaced this as 5xx after the
      # audit-tx fix landed. 20 covers 50 RPS with headroom.
      maximum-pool-size: ${WALLET_HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${WALLET_HIKARI_MIN_IDLE:5}
      # Fast-fail at 5 s instead of waiting the 30 s default — under a real
      # outage, callers should see a clear 5xx immediately so circuit breakers
      # upstream open quickly. Without this, the chaos test showed Payment /
      # Wallet hanging callers for 30 s before erroring.
      connection-timeout: ${WALLET_HIKARI_CONNECTION_TIMEOUT_MS:5000}
      validation-timeout: 2000
      # Surface connection leaks during local dev (off in prod via env).
      leak-detection-threshold: ${WALLET_HIKARI_LEAK_THRESHOLD_MS:60000}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    # Publisher confirms (correlated) + returns — outbox publisher relies on
    # the ConfirmCallback / ReturnsCallback to flip PUBLISHED only on broker
    # ack, otherwise send() lies about delivery (see bug_023).
    publisher-confirm-type: correlated
    publisher-returns: true

server:
  port: 8184
  servlet:
    context-path: /api

# Same JWT_SECRET shared across the platform; validated locally (no callback to Authentication).
jwt:
  secret: ${JWT_SECRET}

# Sibling services Wallet calls (Payment for withdrawal execution).
services:
  payment:
    base-url: ${PAYMENT_SERVICE_URL:http://localhost:8183}

# Service-to-service auth — Class B system JWT signing key (Wallet PDF Decision 6.4).
service-jwt:
  signing-key: ${SERVICE_JWT_SIGNING_KEY:dev-only-replace-in-prod}
  issuer: wallet
  ttl-seconds: 60

# Domain configuration — Wallet PDF.
wallet:
  currency: EGP
  withdrawal:
    minimum-cents: 5000               # 50 EGP minimum (Decision 4.5)
    # Dev/test payout sandbox. Paymob's disbursement (money-out) product isn't
    # provisioned for this merchant, so a real bank payout can't run. When ON,
    # withdrawals complete locally right after the wallet is debited — the
    # money-out equivalent of the Accept card-charge sandbox. Set
    # WALLET_WITHDRAWAL_SANDBOX=false once a real /disburse/ integration exists.
    sandbox: ${WALLET_WITHDRAWAL_SANDBOX:true}
    # Stuck-row reaper for crashes / lost webhooks. Reaper queries Payment by
    # callerReference for any PENDING/SUBMITTING/SENT row older than the grace
    # window and either advances or reverses based on Payment's authoritative
    # state. Disable via reaper.enabled=false until Payment ships its
    # /by-caller-ref lookup endpoint (otherwise every tick will see "NotFound"
    # and reverse stuck rows).
    reaper:
      enabled: true
      grace-seconds: 600               # rows must be idle ≥ 10 min before reaping
      delay-ms: 60000                  # reaper runs every 60 s
  idempotency:
    ttl-hours: 24
  reconciliation:
    cron: "0 30 2 * * *"              # 02:30 daily — sums ledger vs cached balance (Decision 5.2)
  outbox:
    publish-delay-ms: 2000             # broker drain cadence
    in-flight-grace-seconds: 60        # IN_FLIGHT rows older than this reset to PENDING
  scheduling:
    enabled: true                      # set false in test profile to suppress @Scheduled jobs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
