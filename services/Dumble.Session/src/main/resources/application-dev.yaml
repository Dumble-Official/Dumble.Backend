server:
  port: 8182

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/session_service_db?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: root123!
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        highlight_sql: true
    show-sql: true

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

# SpringDoc Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

service-jwt:
  signing-key: ${SERVICE_JWT_SIGNING_KEY:K0Q6NCGDFncmftENnNLP9r9lzaJbvOFCnznXqP0PrI4ag5D8tl5kHpFfoM7tDNjo}
  issuer: dumble-auth   # غيرناها من payment لـ dumble-auth عشان تطابق التوكن
  ttl-seconds: 900000

feign:
  client:
    config:
      payment-service:
        url: http://localhost:8080/api


