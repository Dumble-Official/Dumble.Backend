server:
  port: 8182

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/session_service_db?createDatabaseIfNotExist=true&useSSL=false
    username: root
    password: root123!
    driver-class-name: com.mysql.cj.jdbc.Driver

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        highlight_sql: true
    show-sql: true

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

# SpringDoc Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html

service-jwt:
  signing-key: ${SERVICE_JWT_SIGNING_KEY:Y2hvb29vc2UtYS1zdHJvbmctYmFzZTY0LXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LW9ubHk=}
  issuer: payment
  ttl-seconds: 60

feign:
  client:
    config:
      payment-service:
        url: http://localhost:8183/api


