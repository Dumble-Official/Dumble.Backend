spring:
  application:
    name: gym-service

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

server:
  port: 8181
  servlet:
    context-path: /api

jwt:
  secret: ${JWT_SECRET}

# Auth service — used to promote an approved applicant to GYM_OWNER.
services:
  auth-url: ${SERVICES_AUTH_URL:http://localhost:8081}
internal:
  api-secret: ${INTERNAL_API_SECRET:}

# SpringDoc Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
