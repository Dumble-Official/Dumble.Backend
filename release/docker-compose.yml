services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  social-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_social
      POSTGRES_USER: dumble
      POSTGRES_PASSWORD: ${SOCIAL_DB_PASSWORD:?SOCIAL_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - socialdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dumble"]
      interval: 5s
      timeout: 3s
      retries: 10

  post-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_posts
      POSTGRES_USER: dumble
      POSTGRES_PASSWORD: ${POST_DB_PASSWORD:?POST_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - postdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dumble"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD must be set in release/.env}
    expose:
      - "27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    expose:
      - "5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 10

  gym-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: gym_service_db
      MYSQL_ROOT_PASSWORD: ${GYM_DB_PASSWORD:?GYM_DB_PASSWORD must be set in release/.env}
    expose:
      - "3306"
    volumes:
      - gymdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Application Services ───────────────────────────────────────────

  authentication:
    build:
      context: ../services/Dumble.Authentication
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      DATABASEPASS: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD must be set in release/.env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set in release/.env}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dumble_project
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    build:
      context: ../services/DumbleGateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://authentication:8081
      POST_SERVICE_URL: http://post-service:5134
      SOCIAL_SERVICE_URL: http://social-service:5021
      CHAT_SERVICE_URL: http://chat-service:5022
      NOTIFICATION_SERVICE_URL: http://notification-service:5023
      BUNDLE_SERVICE_URL: http://bundle-service:5012
      GYM_SERVICE_URL: http://gym-service:8181
      # Comma-separated list of allowed CORS origins (no wildcard in production)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set in release/.env}
      # Comma-separated CIDR list of trusted reverse-proxy hops that may set X-Forwarded-*
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      # Rate-limit fail mode when Redis is unreachable: open | closed
      RATELIMIT_FAIL_MODE: ${RATELIMIT_FAIL_MODE:-open}
    depends_on:
      redis:
        condition: service_healthy
      authentication:
        condition: service_started

  post-service:
    build:
      context: ../services
      dockerfile: Dumble.PostService/Dockerfile
    expose:
      - "5134"
    environment:
      ConnectionStrings__PostDb: Host=post-db;Port=5432;Database=dumble_posts;Username=dumble;Password=${POST_DB_PASSWORD:?POST_DB_PASSWORD must be set in release/.env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      post-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  social-service:
    build:
      context: ../services
      dockerfile: Dumble.SocialService/Dockerfile
    expose:
      - "5021"
    environment:
      ConnectionStrings__PostgreSql: Host=social-db;Port=5432;Database=dumble_social;Username=dumble;Password=${SOCIAL_DB_PASSWORD:?SOCIAL_DB_PASSWORD must be set in release/.env}
      ConnectionStrings__Redis: redis:6379
      Services__PostService: http://post-service:5134
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      social-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  chat-service:
    build:
      context: ../services
      dockerfile: Dumble.ChatService/Dockerfile
    expose:
      - "5022"
    environment:
      ConnectionStrings__MongoDb: mongodb://admin:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in release/.env}@mongo:27017
      ConnectionStrings__Redis: redis:6379
      MongoDb__DatabaseName: dumble_chat
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ../services
      dockerfile: Dumble.NotificationService/Dockerfile
    expose:
      - "5023"
    environment:
      ConnectionStrings__MongoDb: mongodb://admin:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in release/.env}@mongo:27017
      ConnectionStrings__Redis: redis:6379
      MongoDb__DatabaseName: dumble_notifications
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  bundle-service:
    build:
      context: ../services/Dumble.BundleManagementService
      dockerfile: Dumble.BundleManagementService.API/Dockerfile
    expose:
      - "5012"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      redis:
        condition: service_healthy

  gym-service:
    build:
      context: ../services/Dumble.GymService
      dockerfile: Dockerfile
    expose:
      - "8181"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://gym-db:3306/gym_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${GYM_DB_PASSWORD:?GYM_DB_PASSWORD must be set in release/.env}
      SERVICES_AUTH_URL: http://authentication:8081
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
    depends_on:
      gym-db:
        condition: service_healthy

volumes:
  redisdata:
  pgdata:
  socialdata:
  postdata:
  mongodata:
  gymdata:
  bundledata:
  postgres_social_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
