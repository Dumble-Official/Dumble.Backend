services:
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  social-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_social
      POSTGRES_USER: dumble
      POSTGRES_PASSWORD: ${SOCIAL_DB_PASSWORD:?SOCIAL_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - socialdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dumble"]
      interval: 5s
      timeout: 3s
      retries: 10

  post-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_posts
      POSTGRES_USER: dumble
      POSTGRES_PASSWORD: ${POST_DB_PASSWORD:?POST_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - postdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dumble"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongo:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD must be set in release/.env}
    expose:
      - "27017"
    volumes:
      - mongodata:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    # Stable node name so the Erlang cookie/node identity is deterministic.
    hostname: rabbitmq
    environment:
      # Pin the Erlang cookie. The image's entrypoint writes it to
      # /var/lib/rabbitmq/.erlang.cookie with an explicit chmod 600 when this is
      # set; otherwise the auto-generated cookie can land with permissions the
      # rabbitmq user can't read on some Docker Desktop / WSL2 hosts, and
      # prelaunch dies with ".erlang.cookie: eacces". Local-dev value only.
      RABBITMQ_ERLANG_COOKIE: "dumble-local-dev-cookie"
    expose:
      - "5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 5s
      timeout: 3s
      retries: 10

  gym-db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: gym_service_db
      MYSQL_ROOT_PASSWORD: ${GYM_DB_PASSWORD:?GYM_DB_PASSWORD must be set in release/.env}
    expose:
      - "3306"
    volumes:
      - gymdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  wallet-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_wallet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${WALLET_DB_PASSWORD:?WALLET_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - walletdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  schedule-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_schedule
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SCHEDULE_DB_PASSWORD:?SCHEDULE_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - scheduledata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  payment-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_payment
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PAYMENT_DB_PASSWORD:?PAYMENT_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - paymentdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  subscription-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_subscription
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${SUBSCRIPTION_DB_PASSWORD:?SUBSCRIPTION_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - subscriptiondata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  bundle-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${BUNDLE_DB_PASSWORD:?BUNDLE_DB_PASSWORD must be set in release/.env}
      MSSQL_PID: Developer
    expose:
      - "1433"
    volumes:
      - bundledata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # ── Application Services ───────────────────────────────────────────

  authentication:
    build:
      context: ../services/Dumble.Authentication
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      DATABASEPASS: ${AUTH_DB_PASSWORD:?AUTH_DB_PASSWORD must be set in release/.env}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:?GOOGLE_CLIENT_ID must be set in release/.env}
      # Shared secret for /api/internal/** (gym service promotes approved applicants to GYM_OWNER)
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in release/.env}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dumble_project
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # RabbitMQ — auth publishes AccountDeleted (right-to-be-forgotten) via its outbox.
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      # First-boot admin bootstrap. Idempotent — once the admin row exists,
      # later boots no-op. Leave enabled with real creds in dev/staging;
      # flip to false in prod after the first deploy.
      ADMIN_BOOTSTRAP_ENABLED: ${ADMIN_BOOTSTRAP_ENABLED:-true}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@dumble.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in release/.env}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway:
    build:
      context: ../services/DumbleGateway
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_SERVICE_URL: http://authentication:8081
      POST_SERVICE_URL: http://post-service:5134
      SOCIAL_SERVICE_URL: http://social-service:5021
      CHAT_SERVICE_URL: http://chat-service:5022
      NOTIFICATION_SERVICE_URL: http://notification-service:5023
      BUNDLE_SERVICE_URL: http://bundle-service:5012
      GYM_SERVICE_URL: http://gym-service:8181
      WALLET_SERVICE_URL: http://wallet:8184
      PAYMENT_SERVICE_URL: http://payment:8183
      SUBSCRIPTION_SERVICE_URL: http://subscription:8182
      FITCOACH_SERVICE_URL: http://fitcoach:8000
      SCHEDULE_SERVICE_URL: http://schedule:8186
      RECOMMENDATION_SERVICE_URL: http://recommendation-service:5024
      # Shared HMAC the gateway signs the X-Internal-Secret header with on
      # /api/coach/** proxies. FitCoach refuses anything else.
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in release/.env}
      # Comma-separated list of allowed CORS origins (no wildcard in production)
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS must be set in release/.env}
      # Comma-separated CIDR list of trusted reverse-proxy hops that may set X-Forwarded-*
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      # Rate-limit fail mode when Redis is unreachable: open | closed
      RATELIMIT_FAIL_MODE: ${RATELIMIT_FAIL_MODE:-open}
    depends_on:
      redis:
        condition: service_healthy
      authentication:
        condition: service_started

  post-service:
    build:
      context: ../services
      dockerfile: Dumble.PostService/Dockerfile
    expose:
      - "5134"
    environment:
      ASPNETCORE_URLS: http://+:5134
      ConnectionStrings__PostDb: Host=post-db;Port=5432;Database=dumble_posts;Username=dumble;Password=${POST_DB_PASSWORD:?POST_DB_PASSWORD must be set in release/.env}
      Cloudinary__Url: ${CLOUDINARY_URL:-cloudinary://placeholder:placeholder@placeholder}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      post-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  social-service:
    build:
      context: ../services
      dockerfile: Dumble.SocialService/Dockerfile
    expose:
      - "5021"
    environment:
      ASPNETCORE_URLS: http://+:5021
      ConnectionStrings__PostgreSql: Host=social-db;Port=5432;Database=dumble_social;Username=dumble;Password=${SOCIAL_DB_PASSWORD:?SOCIAL_DB_PASSWORD must be set in release/.env}
      # Home feed proxies to the recommendation service (Recombee-ranked); social no longer ranks.
      Services__RecommendationApi: http://recommendation-service:5024
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      social-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  chat-service:
    build:
      context: ../services
      dockerfile: Dumble.ChatService/Dockerfile
    expose:
      - "5022"
    environment:
      ASPNETCORE_URLS: http://+:5022
      ConnectionStrings__MongoDb: mongodb://admin:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in release/.env}@mongo:27017
      ConnectionStrings__Redis: redis:6379
      MongoDb__DatabaseName: dumble_chat
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  notification-service:
    build:
      context: ../services
      dockerfile: Dumble.NotificationService/Dockerfile
    expose:
      - "5023"
    environment:
      ASPNETCORE_URLS: http://+:5023
      ConnectionStrings__MongoDb: mongodb://admin:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in release/.env}@mongo:27017
      ConnectionStrings__Redis: redis:6379
      MongoDb__DatabaseName: dumble_notifications
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      RabbitMQ__Host: rabbitmq
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  bundle-service:
    build:
      context: ../services
      dockerfile: Dumble.BundleManagementService/Dumble.BundleManagementService.API/Dockerfile
    expose:
      - "5012"
    environment:
      ASPNETCORE_URLS: http://+:5012
      ConnectionStrings__DatabaseConnection: "Server=bundle-db,1433;Database=dumble_bundles;User Id=sa;Password=${BUNDLE_DB_PASSWORD:?BUNDLE_DB_PASSWORD must be set in release/.env};TrustServerCertificate=True"
      Cloudinary__Url: ${CLOUDINARY_URL:-cloudinary://placeholder:placeholder@placeholder}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      redis:
        condition: service_healthy
      bundle-db:
        condition: service_healthy

  gym-service:
    build:
      context: ../services/Dumble.GymService
      dockerfile: Dockerfile
    expose:
      - "8181"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://gym-db:3306/gym_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${GYM_DB_PASSWORD:?GYM_DB_PASSWORD must be set in release/.env}
      SERVICES_AUTH_URL: http://authentication:8081
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      # Shared secret to call auth's /api/internal promote endpoint on approval
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in release/.env}
      CLOUDINARY_URL: ${CLOUDINARY_URL:-cloudinary://placeholder:placeholder@placeholder}
    depends_on:
      gym-db:
        condition: service_healthy

  payment:
    build:
      context: ../services/Dumble.Payment
      dockerfile: Dockerfile
    expose:
      - "8183"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      SERVICE_JWT_SIGNING_KEY: ${SERVICE_JWT_SIGNING_KEY:?SERVICE_JWT_SIGNING_KEY must be set in release/.env}
      PAYMENT_DB_URL: jdbc:postgresql://payment-db:5432/dumble_payment
      PAYMENT_DB_USERNAME: postgres
      PAYMENT_DB_PASSWORD: ${PAYMENT_DB_PASSWORD:?PAYMENT_DB_PASSWORD must be set in release/.env}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      # Paymob is disabled in dev so the stub provider runs. Flip to true only
      # AFTER bug_4 (real HMAC verification) lands per review-pr5.md.
      PAYMOB_ENABLED: ${PAYMOB_ENABLED:-false}
      PAYMOB_API_KEY: ${PAYMOB_API_KEY:-dev-only-paymob-api-key}
      PAYMOB_HMAC_SECRET: ${PAYMOB_HMAC_SECRET:-dev-only-paymob-hmac-secret}
    depends_on:
      payment-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  wallet:
    build:
      context: ../services/Dumble.Wallet
      dockerfile: Dockerfile
    expose:
      - "8184"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      SERVICE_JWT_SIGNING_KEY: ${SERVICE_JWT_SIGNING_KEY:?SERVICE_JWT_SIGNING_KEY must be set in release/.env}
      WALLET_DB_URL: jdbc:postgresql://wallet-db:5432/dumble_wallet
      WALLET_DB_USERNAME: postgres
      WALLET_DB_PASSWORD: ${WALLET_DB_PASSWORD:?WALLET_DB_PASSWORD must be set in release/.env}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PAYMENT_SERVICE_URL: http://payment:8183
    depends_on:
      wallet-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payment:
        condition: service_started

  subscription:
    build:
      context: ../services/Dumble.Subscription
      dockerfile: Dockerfile
    expose:
      - "8182"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      SERVICE_JWT_SIGNING_KEY: ${SERVICE_JWT_SIGNING_KEY:?SERVICE_JWT_SIGNING_KEY must be set in release/.env}
      SUBSCRIPTION_DB_URL: jdbc:postgresql://subscription-db:5432/dumble_subscription
      SUBSCRIPTION_DB_USERNAME: postgres
      SUBSCRIPTION_DB_PASSWORD: ${SUBSCRIPTION_DB_PASSWORD:?SUBSCRIPTION_DB_PASSWORD must be set in release/.env}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      PAYMENT_SERVICE_URL: http://payment:8183
      WALLET_SERVICE_URL: http://wallet:8184
      BUNDLE_MANAGEMENT_URL: http://bundle-service:5012
      GYM_SERVICE_URL: http://gym-service:8181
      AUTHENTICATION_URL: http://authentication:8081
    depends_on:
      subscription-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payment:
        condition: service_started
      wallet:
        condition: service_started

  # ── Schedule (trainer-to-client coaching delivery) — Spring Boot ─────
  schedule:
    build:
      context: ../services/Dumble.Schedule
      dockerfile: Dockerfile
    expose:
      - "8186"
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      SCHEDULE_DB_URL: jdbc:postgresql://schedule-db:5432/dumble_schedule
      SCHEDULE_DB_USERNAME: postgres
      SCHEDULE_DB_PASSWORD: ${SCHEDULE_DB_PASSWORD:?SCHEDULE_DB_PASSWORD must be set in release/.env}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      SUBSCRIPTION_SERVICE_URL: http://subscription:8182
      AUTHENTICATION_URL: http://authentication:8081
      # Shared secret for /api/internal/** (FitCoach writes the schedule for pro clients)
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in release/.env}
    depends_on:
      schedule-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # ── AI chatbot (Python FastAPI) ─────────────────────────────────────
  # Identity model is Option B: the gateway verifies the user JWT, checks
  # the daily counter and Subscription entitlements, then proxies with
  # X-User-Id + X-Internal-Secret injected. FitCoach never sees the JWT
  # and trusts only the shared HMAC + gateway-set X-User-Id header.
  fitcoach:
    build:
      context: ../services/Dumble.FitCoach
      dockerfile: Dockerfile
    expose:
      - "8000"
    environment:
      GEMINI_API_KEYS: ${GEMINI_API_KEYS:?GEMINI_API_KEYS must be set in release/.env}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set in release/.env}
      # #4 — schedule base URL (context-path /api) for the AI-plan -> schedule sync.
      SCHEDULE_SERVICE_URL: http://schedule:8186/api
      # CORS is enforced at the gateway; FitCoach is only reachable on the
      # internal compose network, so this stays empty to fall back to "*"
      # for the few direct-from-LAN dev probes.
      ALLOWED_ORIGINS: ${FITCOACH_ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      # Per-user memory files live on a named volume so chat history
      # survives container rebuilds. memory_store writes per-user JSON.
      - fitcoachmemory:/app/memory_data

  recommendation-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_recommendations
      POSTGRES_USER: dumble
      POSTGRES_PASSWORD: ${RECOMMENDATION_DB_PASSWORD:?RECOMMENDATION_DB_PASSWORD must be set in release/.env}
    expose:
      - "5432"
    volumes:
      - recommendationdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dumble"]
      interval: 5s
      timeout: 3s
      retries: 10

  recommendation-service:
    build:
      context: ../services
      dockerfile: Dumble.RecommendationService/Dockerfile
    expose:
      - "5024"
    environment:
      ASPNETCORE_URLS: http://+:5024
      ConnectionStrings__RecommendationDb: Host=recommendation-db;Port=5432;Database=dumble_recommendations;Username=dumble;Password=${RECOMMENDATION_DB_PASSWORD:?RECOMMENDATION_DB_PASSWORD must be set in release/.env}
      ConnectionStrings__Redis: redis:6379
      RabbitMQ__Host: rabbitmq
      Services__PostService: http://post-service:5134
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in release/.env}
      # Recombee — server-side private token only (never the public/client token).
      # Leave blank to run without Recombee: interactions still buffer to the outbox
      # and explore falls back to recent posts; flush + recommendations stay disabled.
      RECOMBEE_DATABASE_ID: ${RECOMBEE_DATABASE_ID:-}
      RECOMBEE_PRIVATE_TOKEN: ${RECOMBEE_PRIVATE_TOKEN:-}
      RECOMBEE_REGION: ${RECOMBEE_REGION:-}
      ASPNETCORE_ENVIRONMENT: Production
    depends_on:
      recommendation-db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      post-service:
        condition: service_started

volumes:
  redisdata:
  pgdata:
  socialdata:
  postdata:
  mongodata:
  gymdata:
  bundledata:
  walletdata:
  paymentdata:
  subscriptiondata:
  scheduledata:
  postgres_social_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
  fitcoachmemory:
  recommendationdata:
