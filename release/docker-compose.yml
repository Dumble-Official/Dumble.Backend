services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: dumble_project
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  authentication:
    build:
      context: ../services/Dumble.Authentication
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      DATABASEPASS: root
      GOOGLE_CLIENT_ID: 489462519676-ke7eteiom3rv52jufga8b2tgvfjj8850.apps.googleusercontent.com
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/dumble_project
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
